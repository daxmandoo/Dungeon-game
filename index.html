<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dungeon Depths</title>
  <style>
    :root {
      color-scheme: dark;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0c0f0d;
      font-family: "Trebuchet MS", Arial, sans-serif;
    }
    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(20, 24, 21, 0.65), rgba(0, 0, 0, 0.92));
      color: #d9d4c2;
      text-align: center;
      padding: 1rem;
      z-index: 2;
    }
    #panel {
      max-width: 700px;
      border: 1px solid rgba(255, 176, 97, 0.45);
      background: rgba(8, 10, 9, 0.82);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 130, 50, 0.15);
      border-radius: 10px;
      padding: 1.2rem 1.4rem;
      line-height: 1.45;
    }
    h1 {
      margin: 0 0 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #f3b26b;
      text-shadow: 0 0 14px rgba(255, 136, 50, 0.35);
      font-size: clamp(1.5rem, 3.6vw, 2.6rem);
    }
    p {
      margin: 0.35rem 0;
      color: #c7cbbf;
    }
    .hint {
      margin-top: 0.9rem;
      color: #efc07f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="panel">
      <h1>Dungeon Depths</h1>
      <p>Find your way through twisting stone halls and forgotten chambers.</p>
      <p><strong>Move:</strong> W/A/S/D or Arrow keys (up/down + strafe left/right)</p>
      <p><strong>Look:</strong> Mouse movement or Q / E</p>
      <p><strong>Tip:</strong> Click to lock the mouse for smooth camera control.</p>
      <p class="hint">Click anywhere to enter the dungeon.</p>
    </div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('overlay');

      const mapWidth = 30;
      const mapHeight = 30;
      const map = Array.from({ length: mapHeight }, (_, y) =>
        Array.from({ length: mapWidth }, (_, x) =>
          x === 0 || y === 0 || x === mapWidth - 1 || y === mapHeight - 1 ? 1 : 0
        )
      );

      function carveRoom(x, y, w, h) {
        for (let yy = y; yy < y + h; yy++) {
          for (let xx = x; xx < x + w; xx++) {
            if (xx > 0 && yy > 0 && xx < mapWidth - 1 && yy < mapHeight - 1) map[yy][xx] = 0;
          }
        }
      }

      function generateDungeon() {
        for (let y = 1; y < mapHeight - 1; y++) {
          for (let x = 1; x < mapWidth - 1; x++) map[y][x] = 1;
        }

        const rooms = [];
        const roomCount = 10;
        for (let i = 0; i < roomCount; i++) {
          const w = 4 + Math.floor(Math.random() * 5);
          const h = 4 + Math.floor(Math.random() * 5);
          const x = 1 + Math.floor(Math.random() * (mapWidth - w - 2));
          const y = 1 + Math.floor(Math.random() * (mapHeight - h - 2));
          carveRoom(x, y, w, h);
          rooms.push({ x: x + (w >> 1), y: y + (h >> 1) });
        }

        for (let i = 1; i < rooms.length; i++) {
          const a = rooms[i - 1];
          const b = rooms[i];
          const horizFirst = Math.random() > 0.5;

          if (horizFirst) {
            for (let x = Math.min(a.x, b.x); x <= Math.max(a.x, b.x); x++) map[a.y][x] = 0;
            for (let y = Math.min(a.y, b.y); y <= Math.max(a.y, b.y); y++) map[y][b.x] = 0;
          } else {
            for (let y = Math.min(a.y, b.y); y <= Math.max(a.y, b.y); y++) map[y][a.x] = 0;
            for (let x = Math.min(a.x, b.x); x <= Math.max(a.x, b.x); x++) map[b.y][x] = 0;
          }
        }

        for (let i = 0; i < 70; i++) {
          const sx = 2 + Math.floor(Math.random() * (mapWidth - 4));
          const sy = 2 + Math.floor(Math.random() * (mapHeight - 4));
          if (map[sy][sx] !== 0) continue;
          let x = sx;
          let y = sy;
          const len = 2 + Math.floor(Math.random() * 7);
          const dir = Math.floor(Math.random() * 4);
          const dx = [1, -1, 0, 0][dir];
          const dy = [0, 0, 1, -1][dir];
          for (let j = 0; j < len; j++) {
            x += dx;
            y += dy;
            if (x <= 1 || y <= 1 || x >= mapWidth - 2 || y >= mapHeight - 2) break;
            map[y][x] = 0;
          }
        }
      }

      generateDungeon();

      const player = {
        x: 2.5,
        y: 2.5,
        dir: Math.PI * 0.25,
        fov: Math.PI / 3,
        moveSpeed: 3.2,
        rotSpeed: 2.0,
      };

      function findSpawn() {
        for (let y = 1; y < mapHeight - 1; y++) {
          for (let x = 1; x < mapWidth - 1; x++) {
            if (map[y][x] === 0) {
              player.x = x + 0.5;
              player.y = y + 0.5;
              return;
            }
          }
        }
      }
      findSpawn();

      const keys = Object.create(null);
      let running = false;
      let width = 0;
      let height = 0;
      let lastTime = 0;
      let fps = 0;
      let fpsTimer = 0;
      let frameCounter = 0;

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        width = Math.max(320, Math.floor(window.innerWidth * dpr));
        height = Math.max(200, Math.floor(window.innerHeight * dpr));
        canvas.width = width;
        canvas.height = height;
      }
      resize();
      window.addEventListener('resize', resize);

      document.addEventListener('keydown', (e) => {
        keys[e.key.toLowerCase()] = true;
        if (["arrowup", "arrowdown", "arrowleft", "arrowright", " "].includes(e.key.toLowerCase())) e.preventDefault();
      });
      document.addEventListener('keyup', (e) => (keys[e.key.toLowerCase()] = false));

      document.addEventListener('mousemove', (e) => {
        if (document.pointerLockElement === canvas && running) {
          player.dir += e.movementX * 0.0022;
        }
      });

      function canMove(x, y) {
        const px = Math.floor(x);
        const py = Math.floor(y);
        if (px < 0 || py < 0 || px >= mapWidth || py >= mapHeight) return false;
        return map[py][px] === 0;
      }

      function moveWithCollision(dx, dy) {
        const radius = 0.2;
        const nx = player.x + dx;
        const ny = player.y + dy;
        if (canMove(nx + Math.sign(dx) * radius, player.y) && canMove(nx, player.y + radius) && canMove(nx, player.y - radius)) {
          player.x = nx;
        }
        if (canMove(player.x, ny + Math.sign(dy) * radius) && canMove(player.x + radius, ny) && canMove(player.x - radius, ny)) {
          player.y = ny;
        }
      }

      function fogBlend(r, g, b, dist) {
        const fog = Math.min(1, Math.max(0, (dist - 1.5) / 14));
        const fogR = 12;
        const fogG = 17;
        const fogB = 15;
        return [
          Math.round(r * (1 - fog) + fogR * fog),
          Math.round(g * (1 - fog) + fogG * fog),
          Math.round(b * (1 - fog) + fogB * fog),
        ];
      }

      function castRay(rayDirX, rayDirY) {
        let mapX = Math.floor(player.x);
        let mapY = Math.floor(player.y);

        const deltaDistX = Math.abs(1 / (rayDirX || 0.00001));
        const deltaDistY = Math.abs(1 / (rayDirY || 0.00001));

        let stepX, stepY, sideDistX, sideDistY;
        if (rayDirX < 0) {
          stepX = -1;
          sideDistX = (player.x - mapX) * deltaDistX;
        } else {
          stepX = 1;
          sideDistX = (mapX + 1 - player.x) * deltaDistX;
        }
        if (rayDirY < 0) {
          stepY = -1;
          sideDistY = (player.y - mapY) * deltaDistY;
        } else {
          stepY = 1;
          sideDistY = (mapY + 1 - player.y) * deltaDistY;
        }

        let side = 0;
        while (mapX >= 0 && mapY >= 0 && mapX < mapWidth && mapY < mapHeight) {
          if (sideDistX < sideDistY) {
            sideDistX += deltaDistX;
            mapX += stepX;
            side = 0;
          } else {
            sideDistY += deltaDistY;
            mapY += stepY;
            side = 1;
          }
          if (map[mapY]?.[mapX] > 0) break;
        }

        const perpDist = side === 0
          ? (mapX - player.x + (1 - stepX) / 2) / (rayDirX || 0.00001)
          : (mapY - player.y + (1 - stepY) / 2) / (rayDirY || 0.00001);

        let wallX = side === 0 ? player.y + perpDist * rayDirY : player.x + perpDist * rayDirX;
        wallX -= Math.floor(wallX);

        return {
          dist: Math.max(0.001, perpDist),
          side,
          texShade: wallX,
        };
      }

      function drawScene(dt) {
        const image = ctx.createImageData(width, height);
        const data = image.data;

        const dirX = Math.cos(player.dir);
        const dirY = Math.sin(player.dir);
        const planeX = -dirY * Math.tan(player.fov / 2);
        const planeY = dirX * Math.tan(player.fov / 2);

        for (let y = 0; y < height; y++) {
          const isCeiling = y < height / 2;
          const rel = isCeiling ? y / (height / 2) : (y - height / 2) / (height / 2);
          const base = isCeiling
            ? [28 - rel * 10, 33 - rel * 10, 30 - rel * 7]
            : [18 + rel * 34, 21 + rel * 24, 17 + rel * 14];

          let rowDist = isCeiling ? (height / 2) / Math.max(1, (height / 2 - y)) : (height / 2) / Math.max(1, (y - height / 2));
          rowDist = Math.min(18, rowDist);
          for (let x = 0; x < width; x++) {
            const cameraX = 2 * x / width - 1;
            const rayX = dirX + planeX * cameraX;
            const rayY = dirY + planeY * cameraX;
            const worldX = player.x + rayX * rowDist;
            const worldY = player.y + rayY * rowDist;
            const tx = Math.floor((worldX - Math.floor(worldX)) * 4);
            const ty = Math.floor((worldY - Math.floor(worldY)) * 4);
            const pattern = ((tx + ty) & 1) ? 1.08 : 0.92;
            let [r, g, b] = [base[0] * pattern, base[1] * pattern, base[2] * pattern];

            if (!isCeiling) {
              const torch = Math.max(0, 1 - Math.hypot(worldX - player.x, worldY - player.y) / 7.5);
              r += torch * 12;
              g += torch * 7;
            }

            [r, g, b] = fogBlend(r, g, b, rowDist + (isCeiling ? 1 : 0));
            const i = (y * width + x) * 4;
            data[i] = r;
            data[i + 1] = g;
            data[i + 2] = b;
            data[i + 3] = 255;
          }
        }

        for (let x = 0; x < width; x++) {
          const cameraX = 2 * x / width - 1;
          const rayDirX = dirX + planeX * cameraX;
          const rayDirY = dirY + planeY * cameraX;
          const ray = castRay(rayDirX, rayDirY);
          const lineHeight = Math.floor(height / ray.dist);
          const drawStart = Math.max(0, (height >> 1) - (lineHeight >> 1));
          const drawEnd = Math.min(height - 1, (height >> 1) + (lineHeight >> 1));

          for (let y = drawStart; y <= drawEnd; y++) {
            const wallY = (y - drawStart) / Math.max(1, drawEnd - drawStart);
            const edge = Math.abs(ray.texShade - 0.5) * 2;
            const grout = Math.abs((wallY * 8) % 1 - 0.5) * 2;
            const stone = 0.78 + 0.22 * Math.sin((wallY * 17 + ray.texShade * 11) * 2.6);
            let r = 75 + stone * 22 + edge * 12;
            let g = 80 + stone * 24 + grout * 8;
            let b = 84 + stone * 18;

            if (ray.side === 1) {
              r *= 0.82;
              g *= 0.84;
              b *= 0.86;
            }

            [r, g, b] = fogBlend(r, g, b, ray.dist);
            const i = (y * width + x) * 4;
            data[i] = r;
            data[i + 1] = g;
            data[i + 2] = b;
          }
        }

        ctx.putImageData(image, 0, 0);

        drawHUD(dt);
      }

      function drawHUD(dt) {
        const cx = width / 2;
        const cy = height / 2;

        ctx.strokeStyle = 'rgba(244, 224, 182, 0.8)';
        ctx.lineWidth = Math.max(1, width / 850);
        ctx.beginPath();
        ctx.moveTo(cx - 8, cy);
        ctx.lineTo(cx + 8, cy);
        ctx.moveTo(cx, cy - 8);
        ctx.lineTo(cx, cy + 8);
        ctx.stroke();

        const miniSize = Math.min(220, Math.floor(Math.min(width, height) * 0.28));
        const mapScale = miniSize / mapWidth;
        const pad = 14;
        ctx.fillStyle = 'rgba(5, 8, 7, 0.65)';
        ctx.fillRect(pad - 4, pad - 4, miniSize + 8, miniSize + 8);

        for (let y = 0; y < mapHeight; y++) {
          for (let x = 0; x < mapWidth; x++) {
            if (map[y][x] === 1) {
              ctx.fillStyle = 'rgba(84, 93, 101, 0.92)';
            } else {
              ctx.fillStyle = 'rgba(29, 38, 34, 0.45)';
            }
            ctx.fillRect(pad + x * mapScale, pad + y * mapScale, mapScale - 0.3, mapScale - 0.3);
          }
        }

        ctx.fillStyle = '#f3b26b';
        ctx.beginPath();
        ctx.arc(pad + player.x * mapScale, pad + player.y * mapScale, Math.max(2.8, mapScale * 0.35), 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#f7ce91';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(pad + player.x * mapScale, pad + player.y * mapScale);
        ctx.lineTo(
          pad + (player.x + Math.cos(player.dir) * 1.2) * mapScale,
          pad + (player.y + Math.sin(player.dir) * 1.2) * mapScale
        );
        ctx.stroke();

        ctx.fillStyle = '#ebd9b4';
        ctx.font = `bold ${Math.max(14, Math.floor(width / 78))}px monospace`;
        ctx.fillText(`FPS: ${fps}`, width - 96, 24);
      }

      function update(dt) {
        let fwd = 0;
        let strafe = 0;
        let rotate = 0;

        if (keys['w'] || keys['arrowup']) fwd += 1;
        if (keys['s'] || keys['arrowdown']) fwd -= 1;
        if (keys['a'] || keys['arrowleft']) strafe -= 1;
        if (keys['d'] || keys['arrowright']) strafe += 1;
        if (keys['q']) rotate -= 1;
        if (keys['e']) rotate += 1;

        const moveStep = player.moveSpeed * dt;
        const rotStep = player.rotSpeed * dt;

        if (rotate !== 0) player.dir += rotate * rotStep;

        if (fwd !== 0 || strafe !== 0) {
          const dx = Math.cos(player.dir) * fwd + Math.cos(player.dir + Math.PI / 2) * strafe;
          const dy = Math.sin(player.dir) * fwd + Math.sin(player.dir + Math.PI / 2) * strafe;
          const len = Math.hypot(dx, dy) || 1;
          moveWithCollision((dx / len) * moveStep, (dy / len) * moveStep);
        }
      }

      function loop(ts) {
        if (!running) return;
        const t = ts * 0.001;
        const dt = Math.min(0.033, Math.max(0.001, t - (lastTime || t)));
        lastTime = t;

        update(dt);
        drawScene(dt);

        frameCounter++;
        fpsTimer += dt;
        if (fpsTimer >= 0.25) {
          fps = Math.round(frameCounter / fpsTimer);
          frameCounter = 0;
          fpsTimer = 0;
        }

        requestAnimationFrame(loop);
      }

      function startGame() {
        if (running) return;
        running = true;
        overlay.style.display = 'none';
        canvas.requestPointerLock?.();
        requestAnimationFrame(loop);
      }

      overlay.addEventListener('click', startGame);
      canvas.addEventListener('click', () => {
        if (!running) {
          startGame();
        } else if (document.pointerLockElement !== canvas) {
          canvas.requestPointerLock?.();
        }
      });
    })();
  </script>
</body>
</html>
